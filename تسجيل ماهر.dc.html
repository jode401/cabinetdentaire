<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #241a15; }
  ::selection { background: rgba(231,222,213,0.25); }
  input, select, button { font-family: inherit; }
  input::placeholder { color: rgba(231,222,213,0.35); }
  select option { background: #2c211b; color: #e7ded5; }
  @keyframes floaty1 { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-50px) scale(1.1)} 100%{transform:translate(0,0) scale(1)} }
  @keyframes floaty2 { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(-50px,40px) scale(1.15)} 100%{transform:translate(0,0) scale(1)} }
  @keyframes floaty3 { 0%{transform:translate(0,0)} 50%{transform:translate(30px,45px)} 100%{transform:translate(0,0)} }
  @keyframes waveExpand { 0%{transform:scale(0.25);opacity:0} 18%{opacity:0.55} 100%{transform:scale(2.6);opacity:0} }
  @keyframes logoReveal { 0%{opacity:0;transform:scale(0.78);filter:blur(14px)} 100%{opacity:1;transform:scale(1);filter:blur(0)} }
  @keyframes logoBreath { 0%{transform:scale(1)} 100%{transform:scale(1.055)} }
  @keyframes glowPulse { 0%{opacity:0.15;transform:scale(0.9)} 100%{opacity:0.5;transform:scale(1.15)} }
  @keyframes textReveal { 0%{opacity:0;transform:translateY(24px);letter-spacing:0.5em} 100%{opacity:1;transform:translateY(0);letter-spacing:0.14em} }
  @keyframes textOut { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-18px)} }
  @keyframes overlayOut { 0%{opacity:1} 100%{opacity:0} }
  @keyframes drawCircle { to { stroke-dashoffset: 0; } }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }
  @keyframes successPop { 0%{transform:scale(0.6);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  @keyframes riseIn { 0%{opacity:0;transform:translateY(18px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes floatDot { 0%{transform:translateY(10px) scale(0.5);opacity:0} 45%{opacity:0.75} 100%{transform:translateY(-34px) scale(1);opacity:0} }
  @keyframes spinSheen { to { transform:rotate(360deg); } }
  @keyframes sheenFade { 0%{opacity:0} 100%{opacity:1} }
  @keyframes lineGrow { 0%{width:0;opacity:0} 60%{opacity:1} 100%{width:clamp(120px,34vw,180px);opacity:1} }
  @keyframes sweep { 0%{transform:translateX(-190%) skewX(-14deg);opacity:0} 22%{opacity:1} 80%{opacity:1} 100%{transform:translateX(190%) skewX(-14deg);opacity:0} }
  @keyframes captionIn { 0%{opacity:0;letter-spacing:0.72em} 100%{opacity:0.6;letter-spacing:0.4em} }
  @keyframes introZoom { 0%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes penDraw { to { stroke-dashoffset: 0; } }
  @keyframes inkFill { to { fill-opacity: 1; } }
  @keyframes strokeOut { to { stroke-opacity: 0; } }
  @keyframes softGlow { from { opacity: 0; } to { opacity: 1; } }
</style>
</helmet>
<div dir="rtl" style="position:relative;min-height:100vh;width:100%;overflow:hidden;font-family:'IBM Plex Sans Arabic',sans-serif;background:radial-gradient(120% 130% at 50% 0%, #3a2a22 0%, #2b1f19 45%, #201712 100%);color:#e7ded5;">

  <div style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;top:-12%;right:-8%;width:46vw;height:46vw;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(231,222,213,0.10), rgba(231,222,213,0) 70%);filter:blur(20px);animation:floaty1 22s ease-in-out infinite;"></div>
    <div style="position:absolute;bottom:-16%;left:-10%;width:52vw;height:52vw;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(107,78,64,0.55), rgba(107,78,64,0) 70%);filter:blur(24px);animation:floaty2 28s ease-in-out infinite;"></div>
    <div style="position:absolute;top:34%;left:26%;width:26vw;height:26vw;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(231,222,213,0.06), rgba(231,222,213,0) 70%);filter:blur(18px);animation:floaty3 19s ease-in-out infinite;"></div>

  <div style="position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(28px,6vw,60px) clamp(14px,4vw,20px);opacity:{{ formOpacity }};transform:translateY({{ formY }});transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.8,.2,1);">

    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;margin-bottom:30px;">
      <div style="width:clamp(76px,17vw,96px);height:clamp(76px,17vw,96px);filter:drop-shadow(0 8px 26px rgba(231,222,213,0.18));">

          <path fill="#e7ded5" d="M176.08,104.08c-1.39-1.07-2.79-2.12-4.23-3.13-3.62-2.53-7.38-4.88-10.87-7.58-3.89-2.99-7.2-6.5-7.34-11.91-.15-.04-.3-.07-.45-.1-.83,2.09-1.59,4.21-2.48,6.27-1.49,3.46-1.06,6.7.82,9.88.28.47.37,1.31.13,1.77-7.01,13.37-18.16,21.41-32.61,25.14-2.55.67-3.31.11-3.09-2.52.32-3.98.9-7.93,1.26-11.91.58-6.64.1-13.17-2.22-19.51-2.99-8.12-8.42-14.49-14.57-20.33-6.1-5.8-12.53-11.27-18.3-17.39-8.94-9.48-12.16-20.98-10.22-33.87.42-2.81,1.09-5.59,1.64-8.39-.45.33-.74.71-.88,1.14-1.3,3.9-2.86,7.73-3.78,11.72-2.5,10.82-2.05,21.41,3.5,31.37,3.23,5.79,7.75,10.49,12.57,14.96,5.51,5.1,11.18,10.05,16.39,15.44,8.56,8.86,12.93,19.5,12.06,31.97-.33,4.71-1.01,9.39-1.4,14.09-.28,3.41.62,4.17,3.84,3.25,12.75-3.66,23.54-10.08,30.43-21.92.89-1.53,1.91-2.98,2.87-4.46.08.95-.16,1.74-.39,2.54-1.75,5.97-.79,8.84,4.21,12.58.77.58,1.58,1.13,2.39,1.66,3.14,2.05,6.37,3.98,9.43,6.15,3.53,2.51,7.03,5.11,8.39,9.8.31-.52.52-.82.66-1.14,3.05-6.93,5.63-14.02,7.28-21.43,1.3-5.82-.35-10.51-5.04-14.14ZM176.68,129.22c-3.26-5.67-8.52-8.64-13.52-11.92-2.33-1.52-4.72-2.96-6.93-4.65-4.89-3.75-5.48-6.71-2.88-11.88,5.36,3.73,10.77,7.47,16.15,11.26,1.28.9,2.48,1.93,3.68,2.95,4.43,3.79,5.43,8.48,3.5,14.24Z"></path>
        </svg>
      </div>
      <div style="font-family:'Reem Kufi',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.42em;color:rgba(231,222,213,0.62);padding-right:0.42em;">ملتقى ماهر الإلكتروني</div>
      <p style="max-width:460px;text-align:center;line-height:2;font-size:clamp(13px,3.6vw,15px);font-weight:300;color:rgba(231,222,213,0.72);margin:2px 0 0;text-wrap:pretty;">يسرّنا انضمامكم إلى ملتقى ماهر الإلكتروني، يرجى تعبئة البيانات التالية لإتمام التسجيل</p>
    </div>

    <div style="position:relative;width:100%;max-width:560px;background:linear-gradient(160deg, rgba(231,222,213,0.10), rgba(231,222,213,0.04));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(231,222,213,0.16);border-radius:26px;box-shadow:0 30px 80px -30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(231,222,213,0.14);padding:clamp(24px,5.5vw,36px) clamp(20px,5vw,34px);">

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px 16px;margin-bottom:26px;">
        <div style="font-family:'Reem Kufi',sans-serif;font-weight:600;font-size:clamp(18px,4.6vw,20px);color:#e7ded5;">بيانات التسجيل</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:132px;height:5px;border-radius:99px;background:rgba(231,222,213,0.12);overflow:hidden;">
            <div style="height:100%;border-radius:99px;background:linear-gradient(90deg,#8a6a58,#e7ded5);box-shadow:0 0 12px rgba(231,222,213,0.4);transition:width 0.6s cubic-bezier(.2,.8,.2,1);width:{{ progressPct }};"></div>
          </div>
          <div style="font-size:12px;font-weight:500;color:rgba(231,222,213,0.6);min-width:34px;">{{ progressPct }}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px 18px;">

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">الاسم الشخصي</label>
          <div style="position:relative;">
            <input value="{{ vFirst }}" onInput="{{ onFirst }}" placeholder="اكتب اسمك الأول" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dFirst }};">✓</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">اسم العائلة</label>
          <div style="position:relative;">
            <input value="{{ vLast }}" onInput="{{ onLast }}" placeholder="اكتب اسم العائلة" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dLast }};">✓</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">العمر</label>
          <div style="position:relative;">
            <input value="{{ vAge }}" onInput="{{ onAge }}" inputmode="numeric" placeholder="أدخل عمرك" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dAge }};">✓</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">الجنس</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <button type="button" onClick="{{ setMale }}" style="padding:13px 8px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;outline:none;transition:all .3s ease;background:{{ maleBg }};color:{{ maleColor }};border:1px solid {{ maleBorder }};">ذكر</button>
            <button type="button" onClick="{{ setFemale }}" style="padding:13px 8px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;outline:none;transition:all .3s ease;background:{{ femaleBg }};color:{{ femaleColor }};border:1px solid {{ femaleBorder }};">أنثى</button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">رقم الهاتف</label>
          <div style="position:relative;">
            <input value="{{ vPhone }}" onInput="{{ onPhone }}" inputmode="tel" dir="ltr" placeholder="+966 5X XXX XXXX" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;text-align:right;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dPhone }};">✓</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">البريد الإلكتروني</label>
          <div style="position:relative;">
            <input value="{{ vEmail }}" onInput="{{ onEmail }}" type="email" inputmode="email" dir="ltr" placeholder="name@example.com" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;text-align:right;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dEmail }};">✓</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">الدولة</label>
          <div style="position:relative;">
            <select value="{{ vCountry }}" onChange="{{ onCountry }}" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;outline:none;appearance:none;cursor:pointer;transition:border-color .3s ease, box-shadow .3s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);">
              <option value="" disabled>اختر الدولة</option>
              <option value="السعودية">السعودية</option>
              <option value="الإمارات">الإمارات</option>
              <option value="قطر">قطر</option>
              <option value="الكويت">الكويت</option>
              <option value="البحرين">البحرين</option>
              <option value="عُمان">عُمان</option>
              <option value="مصر">مصر</option>
              <option value="الأردن">الأردن</option>
              <option value="المغرب">المغرب</option>
              <option value="أخرى">أخرى</option>
            </select>
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(231,222,213,0.5);font-size:11px;pointer-events:none;">▾</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;font-weight:500;color:rgba(231,222,213,0.7);">المدينة</label>
          <div style="position:relative;">
            <input value="{{ vCity }}" onInput="{{ onCity }}" placeholder="أدخل مدينتك" style="width:100%;padding:14px 16px;border-radius:14px;background:rgba(231,222,213,0.05);border:1px solid rgba(231,222,213,0.16);color:#e7ded5;font-size:15px;outline:none;transition:border-color .3s ease, box-shadow .3s ease, transform .25s ease, background .3s ease;" style-focus="border-color:#e7ded5;box-shadow:0 0 0 4px rgba(231,222,213,0.10), 0 0 24px rgba(231,222,213,0.18);background:rgba(231,222,213,0.09);transform:translateY(-1px);">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:#e7ded5;color:#6b4e40;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:opacity .4s ease;opacity:{{ dCity }};">✓</span>
          </div>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    phase: 'intro',
    introDone: false,
    submitted: false,
    values: { firstName: '', lastName: '', age: '', gender: '', phone: '', email: '', country: '', city: '' },
  };

  componentDidMount() {
    this._t1 = setTimeout(() => this.setState({ phase: 'form' }), 4300);
    this._t2 = setTimeout(() => this.setState({ introDone: true }), 5300);
  }
  componentWillUnmount() {
    clearTimeout(this._t1); clearTimeout(this._t2);
  }

  skip = () => {
    clearTimeout(this._t1); clearTimeout(this._t2);
    this.setState({ phase: 'form' });
    setTimeout(() => this.setState({ introDone: true }), 900);
  };

  set(k, v) { this.setState(s => ({ values: { ...s.values, [k]: v } })); }

  // غيّر هذا الرابط إلى عنوان الـAPI الحقيقي عند ربط الـbackend
  API_URL = '/api/register';

  submit = async () => {
    const v = this.state.values;
    const all = ['firstName','lastName','age','gender','phone','email','country','city'].every(k => String(v[k]).trim() !== '');
    if (!all || this.state.sending) return;
    this.setState({ sending: true, error: '' });
    try {
      const res = await fetch(this.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(v),
      });
      if (!res.ok) throw new Error('bad status ' + res.status);
      this.setState({ sending: false, submitted: true });
    } catch (err) {
      // أثناء التطوير بدون سيرفر: نعرض النجاح محلياً. احذف هذا السطر بعد ربط الـAPI.
      this.setState({ sending: false, submitted: true });
      // للتعامل الحقيقي مع الخطأ استبدل السطر أعلاه بـ:
      // this.setState({ sending: false, error: 'تعذّر إرسال البيانات، حاول مرة أخرى' });
    }
  };

  renderVals() {
    const v = this.state.values;
    const done = k => (String(v[k]).trim() !== '' ? 1 : 0);
    const keys = ['firstName','lastName','age','gender','phone','email','country','city'];
    const filled = keys.filter(k => String(v[k]).trim() !== '').length;
    const progress = Math.round((filled / keys.length) * 100);
    const allDone = filled === keys.length;

    const genBg = a => (a ? '#e7ded5' : 'rgba(231,222,213,0.05)');
    const genColor = a => (a ? '#3a2a22' : '#e7ded5');
    const genBorder = a => (a ? '#e7ded5' : 'rgba(231,222,213,0.16)');
    const male = v.gender === 'ذكر';
    const female = v.gender === 'أنثى';

    return {
      showIntro: !this.state.introDone,
      submitted: this.state.submitted,
      formOpacity: this.state.phase === 'form' ? 1 : 0,
      formY: this.state.phase === 'form' ? '0px' : '26px',
      progressPct: progress + '%',
      skip: this.skip,
      submit: this.submit,
      submitDisabled: !allDone,
      submitOpacity: allDone ? 1 : 0.5,
      submitCursor: allDone ? 'pointer' : 'not-allowed',

      vFirst: v.firstName, vLast: v.lastName, vAge: v.age, vPhone: v.phone, vEmail: v.email, vCountry: v.country, vCity: v.city,
      dFirst: done('firstName'), dLast: done('lastName'), dAge: done('age'), dPhone: done('phone'), dEmail: done('email'), dCity: done('city'),

      onFirst: e => this.set('firstName', e.target.value),
      onLast: e => this.set('lastName', e.target.value),
      onAge: e => this.set('age', e.target.value.replace(/[^0-9]/g, '')),
      onPhone: e => this.set('phone', e.target.value.replace(/[^0-9+\s]/g, '')),
      onEmail: e => this.set('email', e.target.value),
      onCountry: e => this.set('country', e.target.value),
      onCity: e => this.set('city', e.target.value),
      setMale: () => this.set('gender', 'ذكر'),
      setFemale: () => this.set('gender', 'أنثى'),

      maleBg: genBg(male), maleColor: genColor(male), maleBorder: genBorder(male),
      femaleBg: genBg(female), femaleColor: genColor(female), femaleBorder: genBorder(female),
    };
  }
}
</script>
